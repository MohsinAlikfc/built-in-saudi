# End-to-end tests in Playwright's official container (browsers preinstalled).
#   docker compose -f docker-compose.e2e.yml run --rm e2e
# The image tag must match the @playwright/test version in package.json.
services:
  e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    environment:
      - CI=1
    volumes:
      - .:/app
      - /app/node_modules # keep the container's linux node_modules, not the host's
    command: sh -c "npm ci && npm run build && npx playwright test"
